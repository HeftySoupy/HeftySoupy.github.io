<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Boutique</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background-color: #fdf6f0;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #ffe4e1;
  padding: 15px 20px;
  position: sticky;
  top: 0;
}

.logo {
  font-size: 1.5em;
  font-weight: bold;
  color: #d94f6d;
}

.hamburger {
  display: flex;
  flex-direction: column;
  cursor: pointer;
  width: 25px;
}

.hamburger div {
  height: 3px;
  background: #d94f6d;
  margin: 4px 0;
}

nav {
  display: none;
  flex-direction: column;
  position: absolute;
  top: 60px;
  right: 20px;
  background: #ffe4e1;
  padding: 10px;
  border-radius: 5px;
}

nav.show {
  display: flex;
}

nav a {
  text-decoration: none;
  color: #d94f6d;
  margin: 5px 0;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.product img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Flower Boutique</div>

  <div class="hamburger" onclick="toggleMenu()">
    <div></div><div></div><div></div>
  </div>

  <nav id="menu">
    <a href="contact.html">Contact</a>
    <a href="Pricelist.html">Prices</a>
    <a href="gallery.html">Gallery</a>
  </nav>
</header>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
